<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单兵安全调度台</title>
    <!-- 若需完全断网，请将此链接另存为本地 vue.js 文件并引入 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; background: #121212; color: #00ff00; padding: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        h2, h3 { color: #fff; margin-top: 0; }
        input, select, button { padding: 8px; margin-right: 10px; background: #333; color: #fff; border: 1px solid #555; }
        button { background: #007acc; cursor: pointer; font-weight: bold; }
        button:hover { background: #005f9e; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background: #2d2d30; color: #fff; }
        .running { color: #ffcc00; animation: blink 1s infinite; font-weight: bold; }
        .completed { color: #00ff00; }
        .error { color: #ff4444; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="app">
        <h2>⚡ 离线安全单兵调度台 V2.0</h2>

        <div class="card">
            <h3>[ 目标下发 ]</h3>
            <input v-model="form.target" placeholder="例如: 192.168.1.1/24" style="width: 250px;">
            <select v-model="form.tool_type">
                <option value="FSCAN">fscan (内网综合扫描)</option>
                <option value="NMAP">nmap (端口快速探测)</option>
            </select>
            <button @click="submitTask">Execute (执行探测)</button>
        </div>

        <div class="card">
            <h3>[ 战况看板 ] <span style="font-size:12px; color:#888;">(自动刷新中...)</span></h3>
            <table>
                <tr>
                    <th width="50">ID</th>
                    <th width="150">目标</th>
                    <th width="100">引擎</th>
                    <th>执行状态 / 结果反馈</th>
                    <th width="170">最后更新</th>
                </tr>
                <tr v-if="tasks.length === 0">
                    <td colspan="5" style="text-align: center; color: #666;">等待指令下发...</td>
                </tr>
                <tr v-for="task in tasks" :key="task.id">
                    <td>{{ task.id }}</td>
                    <td>{{ task.target }}</td>
                    <td>{{ task.tool }}</td>
                    <td :class="{'running': task.status.includes('RUNNING'), 'error': task.status.includes('ERROR'), 'completed': task.status.includes('COMPLETED')}">
                        {{ task.status }}
                    </td>
                    <td style="color: #888; font-size: 13px;">{{ task.update_time }}</td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const tasks = ref([]);
                const form = ref({ target: '', tool_type: 'FSCAN' });

                const fetchTasks = async () => {
                    try {
                        const res = await fetch('/api/tasks');
                        const json = await res.json();
                        tasks.value = json.data;
                    } catch (e) {
                        console.error("无法连接到后台大盘");
                    }
                };

                const submitTask = async () => {
                    if (!form.value.target.trim()) return;
                    await fetch('/api/tasks/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form.value)
                    });
                    form.value.target = ''; // 提交后清空输入框
                    fetchTasks(); // 立即刷新状态
                };

                onMounted(() => {
                    fetchTasks();
                    setInterval(fetchTasks, 2000); // 每 2 秒轮询数据库
                });

                return { tasks, form, submitTask };
            }
        }).mount('#app');
    </script>
</body>
</html>
